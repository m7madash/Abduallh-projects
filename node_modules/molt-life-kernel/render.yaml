services:
  - type: web
    name: molt-life-kernel
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_KEY
        sync: false
      - key: WITNESS_WEBHOOK_URL
        sync: false
    healthCheckPath: /api/health
